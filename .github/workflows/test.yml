name: test

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.11', '3.12', '3.13']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: python -m pip install -e .
      - name: Unit and integration tests
        run: python -m unittest discover -s tests -v
      - name: Structural self-test
        run: researchctl self-test
      - name: Quick doctor
        run: researchctl doctor --profile quick
      - name: Template clone remains clean after local init
        shell: bash
        run: |
          researchctl init
          researchctl doctor --profile quick
          test -z "$(git status --porcelain --untracked-files=all)"

  windows-wrapper:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.13'
      - name: Run Windows bootstrap wrapper
        shell: pwsh
        run: .\scripts\bootstrap.ps1 -Initialize -SkipTests
      - name: Verify through the Windows wrapper
        shell: pwsh
        run: .\scripts\verify.ps1 -SkipLint
      - name: Confirm pre-adoption bootstrap is commit-clean
        shell: pwsh
        run: |
          $dirty = git status --porcelain --untracked-files=all
          if ($dirty) {
            Write-Error "Bootstrap dirtied the template clone:`n$dirty"
          }

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.13'
      - name: Install locked development tools
        run: python -m pip install -r requirements-dev.lock
      - name: Ruff lint
        run: ruff check .
      - name: Ruff format check
        run: ruff format --check .

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.13'
      - name: Build wheel and source distribution
        run: |
          python -m pip install -r requirements-dev.lock
          python -m build
      - name: Clean-install wheel smoke test
        run: |
          python -m venv .package-smoke
          .package-smoke/bin/python -m pip install dist/*.whl
          .package-smoke/bin/researchctl --version
          .package-smoke/bin/researchctl self-test
