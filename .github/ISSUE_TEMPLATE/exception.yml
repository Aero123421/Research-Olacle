name: Research Harness Exception
about: Human-owned constitutional boundary or infrastructure failure, not routine experiment approval
labels: ["research:exception"]
body:
  - type: dropdown
    id: category
    attributes:
      label: Category
      options: [Mission or values, Login, Terms or legal, Hard budget, Publication, Irreversible action, Browser, Agent runtime, Compute, GitHub, Data access, Security]
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Affected capability and fallback
    validations:
      required: true
