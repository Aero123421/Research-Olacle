name: Research Campaign
about: One bounded campaign executed through the configured Research Executor runtime profile
labels: ["research:campaign", "agent:executor"]
body:
  - type: input
    id: campaign
    attributes:
      label: Campaign ID
      placeholder: C-001
    validations:
      required: true
  - type: input
    id: runtime_profile
    attributes:
      label: Runtime profile
      description: Stable profile name from .research-lab/config/agents.toml, not a provider model ID.
      placeholder: research_executor
    validations:
      required: true
  - type: textarea
    id: goal
    attributes:
      label: Goal and decision to unlock
    validations:
      required: true
  - type: textarea
    id: conditions
    attributes:
      label: Success, withdrawal, and adoption-exclusion conditions
    validations:
      required: true
  - type: textarea
    id: falsification
    attributes:
      label: Counter-hypotheses and decision-reversal evidence
      description: Keep credible competing explanations live and state what evidence would reverse the recommendation.
    validations:
      required: true
  - type: textarea
    id: risks
    attributes:
      label: Metric-gaming and external-impact risks
    validations:
      required: true
  - type: input
    id: budget
    attributes:
      label: Wall / GPU / cost budget
    validations:
      required: true
