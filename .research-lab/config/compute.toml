[local]
enabled = true
primary_host = "windows"
max_parallel_gpu_jobs = 1
max_gpu_hours_per_day = 20.0

[campaign_defaults]
wall_hours = 12.0
gpu_hours = 8.0
paid_compute_jpy = 0.0

[paid_compute]
enabled = false
monthly_hard_limit_jpy = 0.0
per_job_hard_limit_jpy = 0.0
require_auto_shutdown = true
require_cost_metering = true

[backends.local_windows]
enabled = true
paid = false
priority = 1
cancellation_mode = "cooperative"
cost_metering = false
control_adapter = "none"

[backends.kaggle_notebook]
enabled = false
paid = false
priority = 2
role = "submission_and_environment_reproduction"
cancellation_mode = "unverified"
cost_metering = false
control_adapter = "none"

[backends.ssh_gpu]
enabled = false
paid = true
priority = 3
role = "long_running_overflow"
cancellation_mode = "unverified"
cost_metering = false
control_adapter = "none"

[backends.colab]
enabled = false
paid = false
priority = 4
role = "opportunistic_only"
critical_path_allowed = false
cancellation_mode = "unverified"
cost_metering = false
control_adapter = "none"

[resources.CPU]
enabled = true
kind = "cpu"
backend = "local_windows"
capacity = 1

[resources.GPU0]
enabled = true
kind = "gpu"
backend = "local_windows"
capacity = 1

[resources.GPU1]
enabled = true
kind = "gpu"
backend = "local_windows"
capacity = 1

[resources.Kaggle]
enabled = false
kind = "remote_gpu"
backend = "kaggle_notebook"
capacity = 1

[resources."SSH GPU"]
enabled = false
kind = "remote_gpu"
backend = "ssh_gpu"
capacity = 1

[resources.Colab]
enabled = false
kind = "remote_gpu"
backend = "colab"
capacity = 1
